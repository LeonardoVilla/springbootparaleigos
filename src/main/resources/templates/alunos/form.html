<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${aluno.id} != null ? 'Editar Aluno' : 'Novo Aluno'">Aluno</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Navbar -->
        <nav class="bg-blue-600 text-white shadow-lg">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold">Escola de Alunos</h1>
                <div class="space-x-4 flex items-center">
                    <span class="text-sm">Bem-vindo, <span sec:authentication="name"></span></span>
                    <form th:action="@{/logout}" method="POST" class="inline">
                        <button type="submit" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded transition text-white font-semibold">
                            Sair
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="container mx-auto px-6 py-8">
            <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
                <h2 class="text-3xl font-bold text-gray-800 mb-8" th:text="${aluno.id} != null ? 'Editar Aluno' : 'Novo Aluno'"></h2>

                <form th:if="${aluno.id} == null" th:action="@{/alunos/salvar}" method="POST" class="space-y-6">
                    <div th:replace="alunos/form-fields"></div>
                    <div class="flex gap-4">
                        <button type="submit" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition">
                            Salvar
                        </button>
                        <a href="/alunos" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-lg transition text-center">
                            Cancelar
                        </a>
                    </div>
                </form>

                <form th:if="${aluno.id} != null" th:action="@{/alunos/atualizar/{id}(id=${aluno.id})}" method="POST" class="space-y-6">
                    <div th:replace="alunos/form-fields"></div>
                    <div class="flex gap-4">
                        <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                            Atualizar
                        </button>
                        <a href="/alunos" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-lg transition text-center">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
