<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos - Escola</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Navbar -->
        <nav class="bg-blue-600 text-white shadow-lg">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold">Escola de Alunos</h1>
                <div class="space-x-4 flex items-center">
                    <span class="text-sm">Bem-vindo, <span sec:authentication="name"></span></span>
                    <form th:action="@{/logout}" method="POST" class="inline">
                        <button type="submit" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded transition text-white font-semibold">
                            Sair
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="container mx-auto px-6 py-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">Gerenciar Alunos</h2>
                <a href="/alunos/novo" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition">
                    + Novo Aluno
                </a>
            </div>

            <!-- Search -->
            <div class="mb-6">
                <form th:action="@{/alunos/buscar}" method="GET" class="flex gap-2">
                    <input type="text" name="nome" placeholder="Buscar por nome..." 
                        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition">
                        Buscar
                    </button>
                </form>
            </div>

            <!-- Alunos Table -->
            <div class="bg-white rounded-lg shadow overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="px-6 py-3 text-left text-gray-700 font-semibold">Nome</th>
                            <th class="px-6 py-3 text-left text-gray-700 font-semibold">Matrícula</th>
                            <th class="px-6 py-3 text-left text-gray-700 font-semibold">Email</th>
                            <th class="px-6 py-3 text-left text-gray-700 font-semibold">Telefone</th>
                            <th class="px-6 py-3 text-left text-gray-700 font-semibold">Data Nascimento</th>
                            <th class="px-6 py-3 text-center text-gray-700 font-semibold">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="aluno : ${alunos}" class="border-b hover:bg-gray-50">
                            <td class="px-6 py-4 text-gray-800" th:text="${aluno.nome}"></td>
                            <td class="px-6 py-4 text-gray-800" th:text="${aluno.matricula}"></td>
                            <td class="px-6 py-4 text-gray-800" th:text="${aluno.email}"></td>
                            <td class="px-6 py-4 text-gray-800" th:text="${aluno.telefone}"></td>
                            <td class="px-6 py-4 text-gray-800" th:text="${#temporals.format(aluno.dataNascimento, 'dd/MM/yyyy')}"></td>
                            <td class="px-6 py-4 text-center space-x-2">
                                <a th:href="@{/alunos/editar/{id}(id=${aluno.id})}" 
                                    class="inline-block bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded transition">
                                    Editar
                                </a>
                                <a th:href="@{/alunos/deletar/{id}(id=${aluno.id})}" 
                                    onclick="return confirm('Tem certeza?')"
                                    class="inline-block bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded transition">
                                    Deletar
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(alunos)}">
                            <td colspan="6" class="px-6 py-4 text-center text-gray-500">
                                Nenhum aluno cadastrado
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
