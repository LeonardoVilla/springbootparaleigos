<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Escola</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full text-center">
        <div class="text-red-500 text-6xl mb-4">⚠</div>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Algo deu errado</h1>
        <p class="text-gray-600 mb-6" th:text="${mensagem}">Ocorreu um erro inesperado.</p>
        <a href="/alunos" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition">
            Voltar para a lista
        </a>
    </div>
</body>
</html>
